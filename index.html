<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chairs</title>
    <link rel="stylesheet" href="chairs.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="icon">
</head>
<body>
    <div id="wrapper">
        <div class="container">
            <div class="info">
                <h2>modern chair</h2>
                <h1>Telford Chair</h1>
                <h3>$254<span>$530</span></h3>
                <div class="des">
                    <input class="desbtn" type="radio" name="desbtn" id="des1">
                    <label for="des1">Description</label>
                    <input class="desbtn" type="radio" name="desbtn" id="des2">
                    <label for="des2">Details</label>
                    <div class="des dessec acc1">
                        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Id totam tempora enim officia veritatis hic.</p>
                    </div>
                    <div class="des dessec acc2">
                        <div class="inline">
                            <p><span>80</span>cm<br>Length</p>
                        </div>
                        <div class="inline">
                            <p><span>65</span>cm<br>Width</p>
                        </div>
                        <div class="inline">
                            <p><span>90</span>cm<br>Height</p>
                        </div>
                        <div class="inline">
                            <p><span>17.6</span>lbs<br>Weight</p>
                        </div>
                    </div>
                </div>
                <h4>Choose Color:</h4>
            </div>
            <input type="radio" name="colorbtn" id="color1" class="colorbtn forcol1">
            <label for="color1" class="label1"></label>
            <input type="radio" name="colorbtn" id="color2" class="colorbtn forcol2">
            <label for="color2" class="label2"></label>
            <input type="radio" name="colorbtn" id="color3" class="colorbtn forcol3">
             <label for="color3" class="label3"></label>
            <input type="radio" name="colorbtn" id="color4" class="colorbtn forcol4">
            <label for="color4" class="label4"></label>
            <input type="radio" name="colorbtn" id="color5" class="colorbtn forcol5">
            <label for="color5" class="label5"></label>
            <input type="radio" name="colorbtn" id="color6" class="colorbtn forcol6">
            <label for="color6" class="label6"></label>
            <div class="cartbtn">
                <a href="" class="btn"><i class="fa-solid fa-cart-shopping"></i>Add To Cart</a>
            </div>
            <div class="chairimg chair1"></div>
            <div class="chairimg chair2"></div>
            <div class="chairimg chair3"></div>
            <div class="chairimg chair4"></div>
            <div class="chairimg chair5"></div>
            <div class="chairimg chair6"></div>
            <div class="backcolor"></div>
            <div class="backcolor chair2"></div>
            <div class="backcolor chair3"></div>
            <div class="backcolor chair4"></div>
            <div class="backcolor chair5"></div>
            <div class="backcolor chair6"></div>
        </div>
    </div>
</body>
</html>
